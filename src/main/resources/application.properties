spring.application.name=SistemaTriage

springdoc.api-docs.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/openapi.yaml


#Antes de usar, crear base de datos con nombre sistema_triage
#CREATE DATABASE sistema_triage
spring.datasource.url=jdbc:mariadb://localhost:3306/sistema_triage

#Cambiar individualmente cuando se vaya a usar//
spring.datasource.username=root
spring.datasource.password=bella
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Spring AI ? OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-dummy}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.3

# Proveedor de IA
ia.provider=${IA_PROVIDER:fallback}

# JWT
jwt.secret=sistematriage-super-secret-key-2024-uniquindio-sistemas
jwt.expiration-ms=86400000